spring:
  application:
    name: communication-service
  config:
    import:
      - classpath:application-shared.yml
      - classpath:application-postgres.yml
      - classpath:application-kafka.yml
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

server:
  port: ${COMMUNICATION_SERVICE_PORT:8086}

outbox:
  relay:
    enabled: ${COMMUNICATION_OUTBOX_RELAY_ENABLED:true}
    aggregate-types: CALL,MESSAGE
